<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baby Shower</title>

<style>

:root{
--brown:#b58363;
--brown-dark:#6b4e3d;
--boy:#6ec6ff;
--girl:#ff9ac6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background-image:url("img/fondopagina.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
overflow-x:hidden;
}

/* ========================= */
/* PORTADA */
/* ========================= */

#intro{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;

background-image:url("img/fondopagina.jpg");
background-size:cover;
background-position:center;

z-index:100;
cursor:pointer;

transition:opacity .8s ease;
overflow:hidden;

}

.intro-card{

background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);

padding:60px 80px;
border-radius:30px;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,0.25);

animation:appear 1.2s ease;

z-index:10;

}

.intro-card h1{
font-size:70px;
color:var(--brown);
}

.intro-card .text{
font-size:22px;
margin-top:10px;
color:#6b4e3d;
}

/* ========================= */
/* LLUVIA */
/* ========================= */

.falling{

position:absolute;
top:-100px;
pointer-events:none;
animation:fall linear forwards;

}

.falling img{
width:60px;
}

@keyframes fall{

0%{
transform:translateY(-100px) rotate(0deg);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:.9;
}

}

/* ========================= */
/* CONTENIDO */
/* ========================= */

#main{
display:none;
min-height:100vh;
padding:40px 15px;
flex-direction:column;
align-items:center;
}

/* TITULO NUBE */

/* TITULO NUBE REAL */

.cloud-title{

position:relative;

background:white;

padding:35px 70px;

font-size:42px;
color:var(--brown);

margin-bottom:30px;

border-radius:80px;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

/* BURBUJAS DE LA NUBE */

.cloud-title::before,
.cloud-title::after{

content:"";
position:absolute;
background:white;
border-radius:50%;

}

/* burbuja izquierda */
.cloud-title::before{
width:70px;
height:70px;
top:-30px;
left:40px;
box-shadow:
80px -10px 0 10px white,
150px 0px 0 5px white,
220px -15px 0 15px white;
}

/* burbuja derecha */
.cloud-title::after{
width:60px;
height:60px;
top:-25px;
right:50px;
box-shadow:
-80px -10px 0 10px white,
-150px 5px 0 5px white;
}

/* VIDEO */

.video-box{

background:rgba(255,255,255,0.85);
backdrop-filter:blur(5px);

padding:15px;
border-radius:20px;

max-width:500px;
width:100%;

margin-bottom:30px;

box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.video-box video{
width:100%;
border-radius:15px;
}

/* REPRODUCTOR */

.player{

background:rgba(255,255,255,0.85);
backdrop-filter:blur(5px);

padding:20px;
border-radius:20px;

margin-bottom:30px;

text-align:center;

max-width:500px;
width:100%;

box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.player h2{
color:var(--brown);
margin-bottom:15px;
}

.controls{
display:flex;
justify-content:center;
gap:20px;
}

.controls button{

font-size:26px;
border:none;
background:var(--brown);
color:white;

width:60px;
height:60px;

border-radius:50%;
cursor:pointer;

transition:.3s;

}

.controls button:hover{
background:var(--brown-dark);
transform:scale(1.1);
}

/* INVITACION */

.card{

background:rgba(255,255,255,0.85);
backdrop-filter:blur(5px);

padding:40px 30px;
border-radius:25px;

max-width:600px;
width:100%;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.text{
font-size:22px;
margin:12px 0;
color:#6b4e3d;
}

.boy{color:var(--boy);font-weight:bold;}
.girl{color:var(--girl);font-weight:bold;}

@media(max-width:600px){

.intro-card h1{
font-size:45px;
}

.intro-card{
padding:40px;
}

.cloud-title{
font-size:32px;
}

.text{
font-size:18px;
}

.controls button{
width:55px;
height:55px;
font-size:22px;
}

.falling img{
width:40px;
}

}

</style>
</head>

<body>

<!-- PORTADA -->

<div id="intro" onclick="enterSite()">

<div class="intro-card">

<h1>Baby Shower</h1>

<div class="text">
Me gustaría que formaras parte de esto..
</div>

</div>

</div>

<!-- CONTENIDO -->

<div id="main">

<div class="cloud-title">
Baby Shower
</div>

<div class="video-box">

<video autoplay muted loop playsinline>
<source src="video/video.mp4" type="video/mp4">
</video>

</div>

<div class="player">

<h2>Así suena tu llegada</h2>

<div class="controls">

<button onclick="prevSong(event)">⏮</button>
<button onclick="playSong(event)">▶</button>
<button onclick="pauseSong(event)">⏸</button>
<button onclick="nextSong(event)">⏭</button>

</div>

</div>

<div class="card">

<div class="text"><b>Fecha:</b> 28 de marzo</div>

<div class="text"><b>Hora:</b> 4:00 PM</div>

<div class="text">
<b>Ubicación:</b><br>
Santa Rosa de Lima<br>
Calle Retorno de Fresno Americano #20
</div>

<div class="text">
Si piensas que es niño ven de <span class="boy">azul</span><br>
Si piensas que es niña ven de <span class="girl">rosa</span>
</div>

</div>

</div>

<audio id="music"></audio>

<script>

/* ENTRAR AL SITIO */

function enterSite(){

const intro=document.getElementById("intro");
const main=document.getElementById("main");

intro.style.opacity="0";

setTimeout(()=>{

intro.style.display="none";
main.style.display="flex";

music.play();

},800);

}

/* LLUVIA */

const images=["img/osito.png","img/estrella.png","img/pato.png","img/elefante.png"];

function createFalling(){

const intro=document.getElementById("intro");

const item=document.createElement("div");
item.classList.add("falling");

const img=document.createElement("img");

img.src=images[Math.floor(Math.random()*images.length)];

item.appendChild(img);

item.style.left=Math.random()*100+"%";

const duration=2+Math.random()*2;

item.style.animationDuration=duration+"s";

intro.appendChild(item);

setTimeout(()=>{
item.remove();
},duration*1000);

}

/* aparecen de inmediato */

for(let i=0;i<20;i++){
createFalling();
}

setInterval(createFalling,120);

/* MUSICA */

const songs=[
"audio/contigo.mp3",
"audio/regalo.mp3",
"audio/milo.mp3"
];

let index=0;

const music=document.getElementById("music");
music.src=songs[index];

function playSong(e){
e.stopPropagation();
music.play();
}

function pauseSong(e){
e.stopPropagation();
music.pause();
}

function nextSong(e){
e.stopPropagation();
index++;
if(index>=songs.length){index=0;}
music.src=songs[index];
music.play();
}

function prevSong(e){
e.stopPropagation();
index--;
if(index<0){index=songs.length-1;}
music.src=songs[index];
music.play();
}

</script>

</body>
</html>
