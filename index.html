<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baby Shower</title>

<style>

/* COLORES DE TU PAGINA */
:root{
--primary-color:#e91e63;
--secondary-color:#f48fb1;
--dark-color:#ad1457;
--light-color:#fce4ec;
--white:#ffffff;
}

/* FONDO */
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("img/fondo.jpg");
background-size:cover;
background-position:center;
font-family:'Poppins',sans-serif;
}

/* CONTENEDOR GENERAL */

.layout{
width:95%;
max-width:1200px;
display:flex;
justify-content:space-between;
align-items:center;
gap:40px;
}

/* ---------------- REPRODUCTOR ---------------- */

.music-box{
width:420px;

background:rgba(255,255,255,0.45);
backdrop-filter:blur(8px);

padding:30px;
border-radius:30px;

border:3px dashed var(--primary-color);
outline:3px dashed var(--secondary-color);
outline-offset:-10px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.music-title{
font-size:28px;
color:var(--primary-color);
margin-bottom:20px;
font-weight:700;
}

.album{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
box-shadow:0 10px 20px rgba(0,0,0,0.25);
animation:rotate 10s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.controls{
margin-top:20px;
display:flex;
justify-content:center;
gap:20px;
}

.controls button{
font-size:22px;
border:none;
background:var(--primary-color);
color:white;
width:50px;
height:50px;
border-radius:50%;
cursor:pointer;
}

.controls button:hover{
background:var(--dark-color);
}

/* ---------------- INVITACION ---------------- */

.card{
width:420px;
height:260px;
position:relative;
perspective:2000px;
cursor:pointer;
}

/* INTERIOR */

.card-inside{
position:absolute;
width:100%;
height:100%;
border-radius:15px;

background-image:url("img/fondo.jpg");
background-size:contain;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

.info{
padding:25px;
color:#6b4e3d;
}

.title{
font-size:30px;
color:#b58363;
margin-bottom:10px;
}

.text{
font-size:16px;
margin:6px 0;
}

/* PORTADA */

.cover{
position:absolute;
width:100%;
height:100%;

background:linear-gradient(#f5e4d8,#f1d7c7);

border-radius:15px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

transform-origin:left;
transition:1s;

box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

.cover h1{
font-size:40px;
margin:0;
color:#b58363;
}

.cover p{
margin-top:10px;
}

.decor{
font-size:24px;
margin-bottom:10px;
}

/* APERTURA */

.card.open .cover{
transform:rotateY(-160deg);
}

</style>
</head>

<body>

<div class="layout">

<!-- REPRODUCTOR -->

<div class="music-box">

<div class="music-title">Música</div>

<img class="album" src="img/portada.jpg">

<div class="controls">

<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>

</div>

<audio id="music" src="audio/cancion.mp3"></audio>

</div>


<!-- INVITACION -->

<div class="card" onclick="abrir()">

<div class="card-inside">

<div class="info">

<div class="decor">🧸 ⭐ 🌙 ☁️</div>

<div class="title">Baby Shower</div>

<div class="text"><b>Festejo:</b> Baby Shower</div>
<div class="text"><b>Fecha:</b> 28 de marzo</div>
<div class="text"><b>Hora:</b> 4:00 PM</div>

<div class="text">
<b>Ubicación:</b><br>
Santa Rosa de Lima<br>
Calle Retorno de Fresno Americano #20
</div>

</div>

</div>

<div class="cover">

<div class="decor">🧸 ☁️ ⭐</div>

<h1>Baby Shower</h1>

<p>Haz click para abrir</p>

</div>

</div>

</div>

<script>

function abrir(){
document.querySelector(".card").classList.toggle("open");
}

const music=document.getElementById("music");

function play(){
music.play();
}

function pause(){
music.pause();
}

</script>

</body>
</html>
