<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shower</title>

<style>

:root{
--brown:#b58363;
--brown-dark:#6b4e3d;

--boy:#6ec6ff;
--girl:#ff9ac6;
}

/* FONDO DE TODA LA PAGINA */

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("img/fondopagina.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

font-family:'Poppins',sans-serif;
}

/* TARJETA */

.card{
width:620px;
height:520px;
position:relative;
perspective:2000px;
cursor:pointer;
}

/* INTERIOR */

.card-inside{
position:absolute;
width:100%;
height:100%;
border-radius:20px;

background-image:url("img/fondo.jpg");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

box-shadow:0 25px 50px rgba(0,0,0,0.25);
}

.info{
padding:40px;
margin-top:70px;
color:#6b4e3d;
}

.title{
font-size:60px;
color:#b58363;
margin-bottom:20px;
}

.text{
font-size:26px;
margin:12px 0;
}

.boy{color:var(--boy);font-weight:bold;}
.girl{color:var(--girl);font-weight:bold;}

/* PORTADA */

.cover{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
transform-origin:left;
transition:1s;
}

.cover-front,
.cover-back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
backface-visibility:hidden;
box-shadow:0 25px 50px rgba(0,0,0,0.25);
}

/* PORTADA */

.cover-front{

background:
radial-gradient(circle at top,#ffffff50,transparent 60%),
linear-gradient(135deg,#f5e4d8,#f1d7c7);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

overflow:hidden;

border:6px solid rgba(181,131,99,0.35);
}

/* ESTRELLAS */

.cover-front::before{
content:"✨ ✨ ✨ ✨ ✨";
position:absolute;
top:40px;
font-size:26px;
opacity:.6;
animation:floatStars 6s infinite linear;
}

@keyframes floatStars{
0%{transform:translateY(0)}
50%{transform:translateY(15px)}
100%{transform:translateY(0)}
}

/* GLOBOS */

.balloon{
position:absolute;
width:70px;
height:90px;
border-radius:50%;
opacity:.8;
animation:floatBalloon 8s infinite ease-in-out;
background:#d6a889;
}

.balloon.blue{
left:60px;
bottom:20px;
}

.balloon.pink{
right:60px;
bottom:20px;
animation-delay:2s;
}

@keyframes floatBalloon{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

/* TITULO */

.cover-front h1{
font-size:80px;
margin:0;
color:#b58363;
text-shadow:0 5px 20px rgba(0,0,0,.15);
letter-spacing:3px;
animation:floatTitle 4s infinite ease-in-out;
}

@keyframes floatTitle{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.cover-front p{
margin-top:20px;
font-size:24px;
color:#6b4e3d;
}

/* PARTE TRASERA */

.cover-back{
background:#f5e4d8;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transform:rotateY(180deg);
}

/* MUSICA */

.music-controls{
display:flex;
gap:30px;
margin-top:350px;
}

.music-controls button{
font-size:30px;
border:none;
background:var(--brown);
color:white;
width:80px;
height:80px;
border-radius:50%;
cursor:pointer;
transition:0.3s;
}

.music-controls button:hover{
background:var(--brown-dark);
transform:scale(1.1);
}

/* ABRIR TARJETA */

.card.open .cover{
transform:rotateY(-180deg);
}

/* ========================= */
/* RESPONSIVE PARA CELULAR   */
/* ========================= */

@media (max-width:700px){

.card{
width:92vw;
height:420px;
}

.title{
font-size:40px;
}

.text{
font-size:18px;
}

.cover-front h1{
font-size:50px;
}

.music-controls{
gap:15px;
margin-top:250px;
}

.music-controls button{
width:60px;
height:60px;
font-size:22px;
}

.balloon{
width:50px;
height:65px;
}

}

</style>
</head>

<body>

<div class="card" onclick="abrir()">

<div class="card-inside">

<div class="info">

<div class="title">Baby Shower</div>

<div class="text"><b>Fecha:</b> 28 de marzo</div>
<div class="text"><b>Hora:</b> 4:00 PM</div>

<div class="text">
<b>Ubicación:</b><br>
Santa Rosa de Lima<br>
Calle Retorno de Fresno Americano #20
</div>

<div class="text">
Si piensas que es niño ven de <span class="boy">azul</span><br>
Si piensas que es niña ven de <span class="girl">rosa</span>
</div>

</div>
</div>

<!-- PORTADA -->

<div class="cover">

<div class="cover-front">

<div class="balloon blue"></div>
<div class="balloon pink"></div>

<h1>Baby Shower</h1>

</div>

<div class="cover-back">

<div class="music-controls">

<button onclick="prevSong(event)">⏮</button>
<button onclick="playSong(event)">▶</button>
<button onclick="pauseSong(event)">⏸</button>
<button onclick="nextSong(event)">⏭</button>

</div>

</div>

</div>

</div>

<audio id="music"></audio>

<script>

let abierta=false;

function abrir(){

const card=document.querySelector(".card");

card.classList.toggle("open");

if(!abierta){
music.play();
abierta=true;
}

}

const songs=[
"audio/contigo.mp3",
"audio/regalo.mp3",
"audio/milo.mp3"
];

let index=0;

const music=document.getElementById("music");
music.src=songs[index];

function playSong(e){
e.stopPropagation();
music.play();
}

function pauseSong(e){
e.stopPropagation();
music.pause();
}

function nextSong(e){
e.stopPropagation();

index++;
if(index>=songs.length){index=0;}

music.src=songs[index];
music.play();
}

function prevSong(e){
e.stopPropagation();

index--;
if(index<0){index=songs.length-1;}

music.src=songs[index];
music.play();
}

</script>

</body>
</html>
