<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baby Shower</title>

<style>

:root{
--brown:#b58363;
--brown-dark:#6b4e3d;

--boy:#3fa9f5;
--girl:#ff6fa5;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f5e4d8;
font-family:'Poppins',sans-serif;
}

/* TARJETA */

.card{
width:620px;
height:520px;
position:relative;
perspective:2000px;
cursor:pointer;
}

/* INTERIOR */

.card-inside{
position:absolute;
width:100%;
height:100%;
border-radius:20px;

background-image:url("img/fondo.jpg");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

box-shadow:0 25px 50px rgba(0,0,0,0.25);
}

.info{
padding:40px;
margin-top:70px;
color:#6b4e3d;
}

.title{
font-size:60px;
color:#b58363;
margin-bottom:20px;
}

.text{
font-size:26px;
margin:12px 0;
}

/* COLORES NIÑO NIÑA */

.boy{
color:var(--boy);
font-weight:bold;
}

.girl{
color:var(--girl);
font-weight:bold;
}

/* PORTADA */

.cover{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
transform-origin:left;
transition:1s;
}

.cover-front,
.cover-back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
backface-visibility:hidden;
box-shadow:0 25px 50px rgba(0,0,0,0.25);
}

/* FRENTE */

.cover-front{

background:
radial-gradient(circle at top,#fff5ee,transparent 60%),
linear-gradient(135deg,#f5e4d8,#f1d7c7);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

border:6px solid rgba(181,131,99,0.4);
}

.cover-front::before{
content:"";
position:absolute;
top:30px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(181,131,99,0.15);
filter:blur(20px);
}

.cover-front h1{
font-size:80px;
margin:0;
color:#b58363;
letter-spacing:3px;
text-shadow:2px 2px 8px rgba(0,0,0,0.15);
}

.cover-front p{
margin-top:20px;
font-size:22px;
color:#6b4e3d;
}

/* PARTE TRASERA */

.cover-back{
background:#f5e4d8;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

transform:rotateY(180deg);
}

/* CONTROLES MUSICA */

.music-controls{
display:flex;
gap:30px;
margin-top:350px;
}

.music-controls button{
font-size:30px;
border:none;
background:var(--brown);
color:white;
width:80px;
height:80px;
border-radius:50%;
cursor:pointer;
transition:0.3s;
}

.music-controls button:hover{
background:var(--brown-dark);
transform:scale(1.1);
}

/* ABRIR TARJETA */

.card.open .cover{
transform:rotateY(-180deg);
}

</style>
</head>

<body>

<div class="card" onclick="abrir()">

<!-- INTERIOR -->

<div class="card-inside">

<div class="info">

<div class="title">Baby Shower</div>

<div class="text">
Si piensas que es <span class="boy">niño</span> ven de <span class="boy">azul</span><br>
y si piensas que es <span class="girl">niña</span> ven de <span class="girl">rosa</span>
</div>

<div class="text"><b>Fecha:</b> 28 de marzo</div>
<div class="text"><b>Hora:</b> 4:00 PM</div>

<div class="text">
<b>Ubicación:</b><br>
Santa Rosa de Lima<br>
Calle Retorno de Fresno Americano #20
</div>

</div>

</div>

<!-- PORTADA -->

<div class="cover">

<div class="cover-front">

<h1>Baby Shower</h1>
<p>Haz click para abrir la invitación</p>

</div>

<div class="cover-back">

<div class="music-controls">

<button onclick="prevSong(event)">⏮</button>
<button onclick="playSong(event)">▶</button>
<button onclick="pauseSong(event)">⏸</button>
<button onclick="nextSong(event)">⏭</button>

</div>

</div>

</div>

</div>

<audio id="music"></audio>

<script>

let abierta=false;

function abrir(){

const card=document.querySelector(".card");

card.classList.toggle("open");

if(!abierta){
music.play();
abierta=true;
}

}

const songs=[
"audio/contigo.mp3",
"audio/regalo.mp3",
"audio/milo.mp3"
];

let index=0;

const music=document.getElementById("music");
music.src=songs[index];

function playSong(e){
e.stopPropagation();
music.play();
}

function pauseSong(e){
e.stopPropagation();
music.pause();
}

function nextSong(e){
e.stopPropagation();

index++;

if(index>=songs.length){
index=0;
}

music.src=songs[index];
music.play();
}

function prevSong(e){
e.stopPropagation();

index--;

if(index<0){
index=songs.length-1;
}

music.src=songs[index];
music.play();
}

</script>

</body>
</html>
