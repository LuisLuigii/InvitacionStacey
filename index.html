<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baby Shower</title>

<style>

/* COLORES DE TU PAGINA */
:root{
--primary-color:#e91e63;
--secondary-color:#f48fb1;
--dark-color:#ad1457;
--light-color:#fce4ec;
--white:#ffffff;
}

/* FONDO DE TODA LA PAGINA */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f5e4d8;
font-family:'Poppins',sans-serif;
}

/* INVITACION */

.card{
width:420px;
height:300px;
position:relative;
perspective:2000px;
cursor:pointer;
}

/* INTERIOR */

.card-inside{
position:absolute;
width:100%;
height:100%;
border-radius:15px;

background-image:url("img/fondo.jpg");
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

.info{
padding:20px;
color:#6b4e3d;
}

.title{
font-size:30px;
color:#b58363;
margin-bottom:10px;
}

.text{
font-size:16px;
margin:6px 0;
}

.decor{
font-size:24px;
margin-bottom:10px;
}

/* REPRODUCTOR */

.music-controls{
margin-top:15px;
display:flex;
gap:15px;
}

.music-controls button{
font-size:20px;
border:none;
background:var(--primary-color);
color:white;
width:45px;
height:45px;
border-radius:50%;
cursor:pointer;
}

.music-controls button:hover{
background:var(--dark-color);
}

/* PORTADA */

.cover{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(#f5e4d8,#f1d7c7);
border-radius:15px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

transform-origin:left;
transition:1s;

box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

.cover h1{
font-size:40px;
margin:0;
color:#b58363;
}

.cover p{
margin-top:10px;
}

/* ANIMACION APERTURA */

.card.open .cover{
transform:rotateY(-160deg);
}

</style>
</head>

<body>

<div class="card" onclick="abrir()">

<!-- INTERIOR -->

<div class="card-inside">

<div class="info">

<div class="decor">🧸 ⭐ 🌙 ☁️</div>

<div class="title">Baby Shower</div>

<div class="text"><b>Festejo:</b> Baby Shower</div>
<div class="text"><b>Fecha:</b> 28 de marzo</div>
<div class="text"><b>Hora:</b> 4:00 PM</div>

<div class="text">
<b>Ubicación:</b><br>
Santa Rosa de Lima<br>
Calle Retorno de Fresno Americano #20
</div>

<!-- CONTROLES DE MUSICA -->

<div class="music-controls">

<button onclick="prevSong(event)">⏮</button>
<button onclick="playPause(event)">▶</button>
<button onclick="nextSong(event)">⏭</button>

</div>

</div>

</div>

<!-- PORTADA -->

<div class="cover">

<div class="decor">🧸 ☁️ ⭐</div>

<h1>Baby Shower</h1>

<p>Haz click para abrir</p>

</div>

</div>

<audio id="music"></audio>

<script>

/* ABRIR INVITACION */

function abrir(){
document.querySelector(".card").classList.toggle("open");
}

/* PLAYLIST */

const songs = [
"audio/cancion1.mp3",
"audio/cancion2.mp3",
"audio/cancion3.mp3"
];

let index = 0;
const music = document.getElementById("music");

music.src = songs[index];

/* CONTROLES */

function playPause(e){
e.stopPropagation();

if(music.paused){
music.play();
}else{
music.pause();
}
}

function nextSong(e){
e.stopPropagation();

index++;

if(index >= songs.length){
index = 0;
}

music.src = songs[index];
music.play();
}

function prevSong(e){
e.stopPropagation();

index--;

if(index < 0){
index = songs.length - 1;
}

music.src = songs[index];
music.play();
}

</script>

</body>
</html>
