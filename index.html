<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baby Shower</title>

<style>

:root{
--primary-color:#e91e63;
--secondary-color:#f48fb1;
--dark-color:#ad1457;

--brown:#b58363;
--brown-dark:#6b4e3d;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f5e4d8;
font-family:'Poppins',sans-serif;
}

/* TARJETA */

.card{
width:620px;
height:520px;
position:relative;
perspective:2000px;
cursor:pointer;
}

/* INTERIOR */

.card-inside{
position:absolute;
width:100%;
height:100%;
border-radius:20px;

background-image:url("img/fondo.jpg");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

box-shadow:0 25px 50px rgba(0,0,0,0.25);
}

.info{
padding:40px;
margin-top:70px; /* BAJA EL CONTENIDO */
color:#6b4e3d;
}

.title{
font-size:60px;
color:#b58363;
margin-bottom:20px;
}

.text{
font-size:26px;
margin:12px 0;
}

/* PORTADA */

.cover{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
transform-origin:left;
transition:1s;
}

.cover-front,
.cover-back{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
backface-visibility:hidden;
box-shadow:0 25px 50px rgba(0,0,0,0.25);
}

/* FRENTE */

.cover-front{
background:linear-gradient(#f5e4d8,#f1d7c7);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.cover-front h1{
font-size:90px;
margin:0;
color:#b58363;
}

/* PARTE TRASERA (REPRODUCTOR) */

.cover-back{

background:#f5e4d8;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

transform:rotateY(180deg);
}

/* CONTROLES MUSICA */

.music-controls{
display:flex;
gap:30px;
margin-top:350px; /* BAJA LOS BOTONES */
}

/* BOTONES */

.music-controls button{
font-size:30px;
border:none;
background:var(--brown);
color:white;
width:80px;
height:80px;
border-radius:50%;
cursor:pointer;
transition:0.3s;
}

.music-controls button:hover{
background:var(--brown-dark);
transform:scale(1.1);
}

/* ABRIR TARJETA */

.card.open .cover{
transform:rotateY(-180deg);
}

</style>
</head>

<body>

<div class="card" onclick="abrir()">

<!-- INTERIOR -->

<div class="card-inside">

<div class="info">

<div class="title">Baby Shower</div>

<div class="text"><b>Festejo:</b> Baby Shower</div>
<div class="text"><b>Fecha:</b> 28 de marzo</div>
<div class="text"><b>Hora:</b> 4:00 PM</div>

<div class="text">
<b>Ubicación:</b><br>
Santa Rosa de Lima<br>
Calle Retorno de Fresno Americano #20
</div>

</div>

</div>

<!-- PORTADA -->

<div class="cover">

<!-- FRENTE -->

<div class="cover-front">

<h1>Baby Shower</h1>

</div>

<!-- DETRAS DE PORTADA -->

<div class="cover-back">

<div class="music-controls">

<button onclick="prevSong(event)">⏮</button>
<button onclick="playSong(event)">▶</button>
<button onclick="pauseSong(event)">⏸</button>
<button onclick="nextSong(event)">⏭</button>

</div>

</div>

</div>

</div>

<audio id="music"></audio>

<script>

function abrir(){
document.querySelector(".card").classList.toggle("open");
}

/* PLAYLIST */

const songs=[
"audio/contigo.mp3",
"audio/regalo.mp3",
"audio/milo.mp3"
];

let index=0;

const music=document.getElementById("music");
music.src=songs[index];

function playSong(e){
e.stopPropagation();
music.play();
}

function pauseSong(e){
e.stopPropagation();
music.pause();
}

function nextSong(e){
e.stopPropagation();

index++;

if(index>=songs.length){
index=0;
}

music.src=songs[index];
music.play();
}

function prevSong(e){
e.stopPropagation();

index--;

if(index<0){
index=songs.length-1;
}

music.src=songs[index];
music.play();
}

</script>

</body>
</html>
