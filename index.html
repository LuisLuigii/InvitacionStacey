<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baby Shower</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#f3e6dc,#f7efe8);
font-family: 'Georgia', serif;
}

/* CONTENEDOR */

.card{
width:750px;
height:450px;
position:relative;
perspective:2000px;
cursor:pointer;
}

/* INTERIOR */

.card-inside{
position:absolute;
width:100%;
height:100%;
border-radius:15px;

background-image:
linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
url("img/fondo.jpg");

background-size: 100% 100%;
background-position: center;
background-repeat: no-repeat;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

/* TEXTO */

.info{
background:rgba(255,255,255,0.8);
padding:40px;
border-radius:15px;
}

.title{
font-size:42px;
color:#b58363;
margin-bottom:20px;
}

.text{
font-size:20px;
margin:10px 0;
}

/* PORTADA */

.cover{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(#f5e4d8,#f1d7c7);
border-radius:15px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

transform-origin:left;
transition:1s;

box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.cover h1{
font-size:55px;
color:#b58363;
margin:0;
}

.cover p{
margin-top:15px;
font-size:18px;
}

/* DECORACIÓN */

.decor{
font-size:28px;
margin-bottom:15px;
}

/* APERTURA */

.card.open .cover{
transform:rotateY(-160deg);
}

</style>
</head>

<body>

<div class="card" onclick="abrir()">

<!-- INTERIOR -->

<div class="card-inside">

<div class="info">

<div class="decor">🧸 ⭐ 🌙 ☁️</div>

<div class="title">Baby Shower</div>

<div class="text"><b>Festejo:</b> Baby Shower</div>
<div class="text"><b>Fecha:</b> 28 de marzo</div>
<div class="text"><b>Hora:</b> 4:00 PM</div>

<div class="text">
<b>Ubicación:</b><br>
Santa Rosa de Lima<br>
Calle Retorno de Fresno Americano #20
</div>

</div>

</div>

<!-- PORTADA -->

<div class="cover">

<div class="decor">🧸 ☁️ ⭐</div>

<h1>Baby Shower</h1>

<p>Haz click para abrir la invitación</p>

</div>

</div>

<script>

function abrir(){
document.querySelector(".card").classList.toggle("open");
}

</script>

</body>
</html>
